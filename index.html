<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NFR Advisor</title>
  <link rel="icon" href="data:," />
  <script>
    /* apply saved theme before first paint to avoid flash */
    (function () { try { document.documentElement.setAttribute("data-theme", localStorage.getItem("nfr-theme") || "dark"); } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); } })();
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">NFR&nbsp;<span>Advisor</span></div>
    <nav id="tabs"></nav>
    <button class="theme-toggle" id="themeToggle" title="Toggle light / dark" aria-label="Toggle theme"></button>
  </header>
  <div class="wrap">
    <div class="layout">
      <aside class="panel" id="rail"></aside>
      <main id="view"></main>
    </div>
  </div>
  <footer class="app-footer">
    <span><strong>NFR Advisor</strong> <span id="footVersion">v2</span></span>
    <span>Grounded in ISO/IEC&nbsp;25010 · arc42&nbsp;Q42 · ATAM/SEI</span>
    <span class="spacer"></span>
    <span>Built by <strong>Gaurav Sharma</strong> ·
      <a href="https://github.com/gauravs19" target="_blank" rel="noopener">@gauravs19</a> ·
      <a href="https://github.com/gauravs19/nfr-advisor" target="_blank" rel="noopener">source</a></span>
  </footer>
  <script src="js/engine.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
