<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NFR Advisor</title>
  <link rel="icon" href="data:," />
  <script>
    /* apply saved theme before first paint to avoid flash */
    (function () { try { document.documentElement.setAttribute("data-theme", localStorage.getItem("nfr-theme") || "light"); } catch (e) { document.documentElement.setAttribute("data-theme", "light"); } })();
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">NFR&nbsp;<span>Advisor</span></div>
    <nav id="tabs" role="tablist" aria-label="NFR workflow steps"></nav>
    <button class="theme-toggle" id="shareBtn" title="Copy a shareable link to this assessment">🔗 Share</button>
    <button class="theme-toggle" id="themeToggle" title="Toggle light / dark" aria-label="Toggle theme"></button>
  </header>
  <nav id="journey" class="journey" aria-label="Workflow progress"></nav>
  <div class="wrap">
    <div class="layout">
      <aside class="panel" id="rail"></aside>
      <main id="view" role="tabpanel" tabindex="0"></main>
    </div>
  </div>
  <footer class="app-footer">
    <span><strong>NFR Advisor</strong> <span id="footVersion">v2</span></span>
    <span>Grounded in
      <abbr class="term" title="ISO/IEC 25010 — the international standard product-quality model: 9 quality characteristics (performance, reliability, security, maintainability, …) that the catalog is organised by.">ISO/IEC&nbsp;25010</abbr> ·
      <abbr class="term" title="arc42 Quality Model (Q42) — a practical, scenario-based quality-requirements catalogue from the arc42 architecture-documentation template.">arc42&nbsp;Q42</abbr> ·
      <abbr class="term" title="ATAM / SEI — Architecture Tradeoff Analysis Method and the SEI 6-part quality-attribute scenario (source · stimulus · artifact · environment · response · measure).">ATAM/SEI</abbr></span>
    <span class="spacer"></span>
    <span>Built by <strong>Gaurav Sharma</strong> ·
      <a href="https://github.com/gauravs19" target="_blank" rel="noopener">@gauravs19</a> ·
      <a href="https://github.com/gauravs19/nfr-advisor" target="_blank" rel="noopener">source</a></span>
  </footer>
  <script src="js/engine.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
